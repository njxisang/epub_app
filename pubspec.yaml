name: epub_app
description: "EpubStudio - EPUB电子书排版应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Rich Text Editor
  flutter_quill: ^10.8.5

  # Image Handling
  image_picker: ^1.1.2
  image: ^4.3.0

  # EPUB Generation
  epub: ^3.0.0

  # Local Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # File Sharing
  share_plus: ^10.1.4

  # Routing
  go_router: ^14.6.2

  # Dependency Injection
  get_it: ^8.0.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
