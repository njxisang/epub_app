name: epub_app
description: "EpubStudio - EPUB电子书排版应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Rich Text Editor
  flutter_quill: ^9.6.0

  # Image Handling
  image_picker: ^1.1.2
  image: ^4.8.0

  # EPUB Generation (using archive to create ZIP-based EPUB)
  archive: ^4.0.9

  # Local Storage
  path_provider: ^2.1.5
  path: ^1.9.0

  # File Sharing
  share_plus: ^10.0.0

  # Routing
  go_router: ^14.8.1

  # Dependency Injection
  get_it: ^9.2.1

  # Utilities
  uuid: ^4.5.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
